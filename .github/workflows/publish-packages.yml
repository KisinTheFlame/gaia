name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 0.1.3)"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: "@kisinwen"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve publish version
        id: meta
        run: |
          if [ -n "${{ inputs.version || '' }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Unable to resolve version from event context"
            exit 1
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver version: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package versions
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          pnpm --filter @kisinwen/gaia-shared exec npm pkg set "version=$VERSION"
          pnpm --filter @kisinwen/gaia-client exec npm pkg set "version=$VERSION"
          pnpm --filter @kisinwen/gaia-client exec npm pkg set "dependencies.@kisinwen/gaia-shared=$VERSION"

      - name: Build shared and client
        run: |
          pnpm --filter @kisinwen/gaia-shared build
          pnpm --filter @kisinwen/gaia-client build

      - name: Publish shared
        run: pnpm --filter @kisinwen/gaia-shared publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish client
        run: pnpm --filter @kisinwen/gaia-client publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
