services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gaia
      - POSTGRES_USER=gaia
      - POSTGRES_PASSWORD=gaia
    volumes:
      - gaia-postgres-data:/var/lib/postgresql/data
    networks:
      - axis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaia -d gaia"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  gaia-config-center:
    image: gaia-config-center:latest
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "20005:20005"
    environment:
      - PORT=20005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=gaia
      - DB_USER=gaia
      - DB_PASSWORD=gaia
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - axis
    restart: unless-stopped

  gaia-web:
    image: gaia-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "20006:80"
    depends_on:
      - gaia-config-center
    networks:
      - axis
    restart: unless-stopped

volumes:
  gaia-postgres-data:

networks:
  axis:
    external: true
