services:
  gaia-config-center:
    image: gaia-config-center:latest
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "20005:20005"
    environment:
      PORT: 20005
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    networks:
      - axis
    restart: unless-stopped

  gaia-web:
    image: gaia-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "20006:80"
    depends_on:
      - gaia-config-center
    networks:
      - axis
    restart: unless-stopped

networks:
  axis:
    name: ${NETWORK:-axis}
    external: true
